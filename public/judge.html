<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Judge Scoring</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding: 16px; }

  .screen { max-width: 480px; margin: 0 auto; display: none; }
  .screen.active { display: block; }

  #screen-login { margin-top: 60px; text-align: center; }
  #screen-login h1 { font-size: 24px; margin-bottom: 8px; }
  #screen-login p  { color: #666; margin-bottom: 24px; font-size: 15px; }
  .field { margin-bottom: 12px; text-align: left; }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  .field input  { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-size: 16px; }
  .primary-btn  { width: 100%; padding: 14px; background: #7c3aed; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .primary-btn:active { opacity: 0.8; }
  .error-msg { background: #1a0505; border: 1px solid #450a0a; color: #fca5a5; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; display: none; line-height: 1.5; }
  .slots-msg { background: #111; border: 1px solid #1e1e1e; color: #555; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }

  .header    { text-align: center; padding: 16px 0 8px; }
  .header h2 { font-size: 20px; font-weight: 700; }
  .header .who { font-size: 12px; color: #333; margin-top: 4px; }

  .banner { text-align: center; padding: 12px 16px; border-radius: 8px; margin: 12px 0; font-size: 14px; font-weight: 500; line-height: 1.5; }
  .banner-waiting  { background: #111;    color: #555; }
  .banner-open     { background: #0d2a1a; color: #86efac; }
  .banner-locked   { background: #1a0a05; color: #fdba74; }
  .banner-revealed { background: #111;    color: #555; }

  .corners { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0; }
  .corner-label { text-align: center; padding: 8px; border-radius: 6px; font-weight: 700; font-size: 14px; }
  .red-label  { background: #5b0000; color: #fca5a5; }
  .blue-label { background: #001060; color: #93c5fd; }

  .criterion-row { border-bottom: 1px solid #141414; padding: 10px 0; }
  .criterion-name { font-size: 12px; color: #555; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .scores-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .likert { display: flex; gap: 5px; }
  .likert label { flex: 1; }
  .likert input { display: none; }
  .likert span {
    display: flex; align-items: center; justify-content: center;
    height: 48px; border-radius: 6px; font-size: 17px; font-weight: 700;
    cursor: pointer; border: 2px solid #1a1a1a; color: #2a2a2a; background: #0f0f0f;
    transition: all 0.12s;
  }
  .likert span:hover { border-color: #3a3a3a; color: #666; }
  .likert input:checked + span {
    border-color: transparent; color: #fff; transform: scale(1.12); font-size: 20px;
  }
  .red-group  .likert input:checked + span { background: #ef4444; box-shadow: 0 0 14px rgba(239,68,68,0.5), 0 0 0 3px rgba(239,68,68,0.2); }
  .blue-group .likert input:checked + span { background: #3b82f6; box-shadow: 0 0 14px rgba(59,130,246,0.5), 0 0 0 3px rgba(59,130,246,0.2); }

  .submit-btn { width: 100%; padding: 16px; margin: 20px 0; background: #7c3aed; border: none; border-radius: 10px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; }
  .submit-btn:active { opacity: 0.85; }

  #screen-submitted { text-align: center; padding: 48px 20px; }
  .big-tick  { font-size: 64px; margin-bottom: 16px; }
  .sub-title { font-size: 26px; font-weight: 700; color: #86efac; margin-bottom: 10px; }
  .sub-msg   { color: #555; font-size: 14px; margin-bottom: 32px; line-height: 1.7; padding: 0 16px; }
  .amend-btn { padding: 14px 36px; background: #111; border: 1px solid #222; border-radius: 8px; color: #666; font-size: 15px; font-weight: 600; cursor: pointer; }
  .amend-btn:hover { border-color: #444; color: #fff; }
  .lock-notice { color: #fdba74; font-size: 13px; margin-top: 20px; line-height: 1.7; padding: 0 16px; }

  #screen-full { margin-top: 80px; text-align: center; }
  #screen-full h1 { font-size: 22px; margin-bottom: 12px; }
  #screen-full p  { color: #444; font-size: 15px; line-height: 1.7; }
</style>
</head>
<body>

<div class="screen active" id="screen-login">
  <h1>Judge Login</h1>
  <p>Enter Your Details to Join</p>
  <div class="error-msg" id="error-msg"></div>
  <div class="slots-msg" id="slots-msg"></div>
  <div class="field">
    <label>Your Name</label>
    <input id="inp-name" type="text" placeholder="e.g. Sarah" maxlength="30" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="field" id="pw-field" style="display:none">
    <label>Event Password</label>
    <input id="inp-password" type="password" placeholder="Enter Password" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="primary-btn" id="login-btn" onclick="login()">Join as Judge</button>
</div>

<div class="screen" id="screen-app">
  <div class="header">
    <h2 id="round-label">Round 1</h2>
    <div class="who" id="who-label"></div>
  </div>
  <div class="banner banner-waiting" id="banner">Waiting for MC to Open Voting...</div>
  <div id="scoring-area"></div>
</div>

<div class="screen" id="screen-submitted">
  <div class="big-tick">✓</div>
  <div class="sub-title">Scores Submitted</div>
  <div class="sub-msg" id="sub-msg">Waiting for the MC to Lock Voting.</div>
  <button class="amend-btn" id="amend-btn" onclick="goAmend()">Amend Scores</button>
  <div class="lock-notice" id="lock-notice" style="display:none"></div>
</div>

<div class="screen" id="screen-full">
  <h1>All Judge Slots Are Full</h1>
  <p>The Maximum Number of Judges Have Already Joined.<br>Please Speak to the MC if You Need Access.</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io()

  let myName     = ''
  let criteria   = []
  let lastScores = null
  let lastState  = null
  let curStatus  = 'waiting'

  socket.emit('probe')

  socket.on('probeResponse', ({ hasPassword, slotsFull, slotsLeft }) => {
    document.getElementById('pw-field').style.display = hasPassword ? 'block' : 'none'
    if (slotsFull) {
      show('full')
    } else {
      const el = document.getElementById('slots-msg')
      el.textContent  = slotsLeft === 1 ? '1 Judge Slot Remaining' : slotsLeft + ' Judge Slots Remaining'
      el.style.display = 'block'
    }
  })

  socket.on('authOk', () => {
    document.getElementById('who-label').textContent = 'Logged In As: ' + myName
    show('app')
    setBanner('waiting', 'Waiting for MC to Open Voting...')
  })

  socket.on('authError', (msg) => {
    myName = ''
    showErr(msg)
    const btn = document.getElementById('login-btn')
    btn.disabled    = false
    btn.textContent = 'Join as Judge'
  })

  socket.on('stateUpdate', (s) => {
    curStatus = s.status
    if (s.criteria && s.criteria.length) criteria = s.criteria
    if (s.hasPassword !== undefined)
      document.getElementById('pw-field').style.display = s.hasPassword ? 'block' : 'none'

    if (current() === 'login' || current() === 'full') return

    lastState = s
    document.getElementById('round-label').textContent = 'Round ' + s.roundNumber

    if (s.status === 'waiting') {
      lastScores = null
      show('app')
      setBanner('waiting', 'Waiting for MC to Open Voting...')
      document.getElementById('scoring-area').innerHTML = ''

    } else if (s.status === 'open') {
      if (current() === 'submitted') {
        setSubMsg('Voting Is Open — You Can Still Amend Your Scores.')
        showAmendBtn(true)
      } else {
        show('app')
        setBanner('open', 'Voting Is Open — Score Both Corners for Each Criterion')
        renderForm(s)
      }

    } else if (s.status === 'locked') {
      if (current() === 'submitted') {
        setSubMsg('Your Scores Have Been Locked In.')
        showAmendBtn(false)
      } else if (current() === 'app' && lastScores) {
        show('submitted')
        setSubMsg('Voting Was Locked While You Were Amending.')
        showAmendBtn(false)
        setLockNotice('Your Previously Submitted Scores Have Been Counted — Any Changes You Were Making Were Not Saved.')
      } else {
        show('app')
        setBanner('locked', 'Voting Is Now Locked — No Scores Were Recorded from You')
        document.getElementById('scoring-area').innerHTML = ''
      }

    } else if (s.status === 'revealed' || s.status === 'battle_over') {
      lastScores = null
      show('app')
      setBanner('revealed', 'Result Revealed — See the Display Screen')
      document.getElementById('scoring-area').innerHTML = ''
    }
  })

  function login() {
    const name = document.getElementById('inp-name').value.trim()
    const pass = document.getElementById('inp-password').value
    if (!name) { showErr('Please Enter Your Name.'); return }
    myName = name
    const btn = document.getElementById('login-btn')
    btn.disabled    = true
    btn.textContent = 'Joining...'
    document.getElementById('error-msg').style.display = 'none'
    socket.emit('joinAs', { role: 'judge', password: pass, judgeName: name })
  }

  function renderForm(s) {
    const redName  = (s && s.redName)  || (lastState && lastState.redName)  || 'Red Corner'
    const blueName = (s && s.blueName) || (lastState && lastState.blueName) || 'Blue Corner'
    let html = `<div class="corners">
      <div class="corner-label red-label">${redName}</div>
      <div class="corner-label blue-label">${blueName}</div>
    </div>`
    criteria.forEach((c, i) => {
      const pr = lastScores ? lastScores.red[i]  : null
      const pb = lastScores ? lastScores.blue[i] : null
      html += `<div class="criterion-row">
        <div class="criterion-name">${c}</div>
        <div class="scores-row">
          <div class="red-group likert">`
      for (let v = 1; v <= 5; v++)
        html += `<label><input type="radio" name="r${i}" value="${v}"${pr===v?' checked':''}><span>${v}</span></label>`
      html += `</div><div class="blue-group likert">`
      for (let v = 1; v <= 5; v++)
        html += `<label><input type="radio" name="b${i}" value="${v}"${pb===v?' checked':''}><span>${v}</span></label>`
      html += `</div></div></div>`
    })
    html += `<button class="submit-btn" onclick="submitScores()">Submit Scores</button>`
    document.getElementById('scoring-area').innerHTML = html
  }

  function submitScores() {
    if (curStatus !== 'open') return
    const red = [], blue = []
    for (let i = 0; i < criteria.length; i++) {
      const r = document.querySelector(`input[name="r${i}"]:checked`)
      const b = document.querySelector(`input[name="b${i}"]:checked`)
      if (!r || !b) { alert('Please Score All Criteria for Both Corners Before Submitting.'); return }
      red.push(+r.value)
      blue.push(+b.value)
    }
    lastScores = { red, blue }
    socket.emit('submitScores', { judgeId: myName, red, blue })
    show('submitted')
    setSubMsg('Waiting for the MC to Lock Voting.')
    showAmendBtn(true)
    setLockNotice('')
  }

  function goAmend() {
    if (curStatus !== 'open') return
    show('app')
    setBanner('open', 'Amend Your Scores and Resubmit')
    renderForm(lastState)
  }

  function show(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    document.getElementById('screen-' + name).classList.add('active')
  }
  function current() {
    const a = document.querySelector('.screen.active')
    return a ? a.id.replace('screen-', '') : 'login'
  }
  function setBanner(type, text) {
    const b = document.getElementById('banner')
    b.className   = 'banner banner-' + type
    b.textContent = text
  }
  function showErr(msg) {
    const e = document.getElementById('error-msg')
    e.textContent   = msg
    e.style.display = 'block'
  }
  function setSubMsg(msg)     { document.getElementById('sub-msg').textContent = msg }
  function showAmendBtn(show) {
    document.getElementById('amend-btn').style.display   = show ? 'inline-block' : 'none'
    document.getElementById('lock-notice').style.display = 'none'
  }
  function setLockNotice(msg) {
    const el = document.getElementById('lock-notice')
    el.textContent   = msg
    el.style.display = msg ? 'block' : 'none'
  }
</script>
</body>
</html>
