<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Judge Scoring</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding: 16px; }

  #setup { max-width: 400px; margin: 60px auto; text-align: center; }
  #setup h1 { font-size: 24px; margin-bottom: 8px; }
  #setup p { color: #888; margin-bottom: 24px; }
  #setup input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; margin-bottom: 12px; }
  #setup button { width: 100%; padding: 14px; background: #7c3aed; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }

  #app { max-width: 480px; margin: 0 auto; display: none; }

  .header { text-align: center; padding: 16px 0 8px; }
  .header h2 { font-size: 18px; color: #ccc; }
  .header .round { font-size: 13px; color: #666; margin-top: 4px; }

  .status-banner { text-align: center; padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 14px; font-weight: 500; }
  .status-waiting { background: #1a1a1a; color: #888; }
  .status-open { background: #14532d; color: #86efac; }
  .status-locked { background: #431407; color: #fdba74; }
  .status-submitted { background: #1e3a5f; color: #93c5fd; }
  .status-revealed { background: #1a1a1a; color: #888; }

  .corners { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0; }
  .corner-label { text-align: center; padding: 8px; border-radius: 6px; font-weight: 700; font-size: 14px; letter-spacing: 0.05em; }
  .red-label { background: #7f1d1d; color: #fca5a5; }
  .blue-label { background: #1e3a8a; color: #93c5fd; }

  .criteria { display: flex; flex-direction: column; gap: 0; }
  .criterion-row { border-bottom: 1px solid #1a1a1a; padding: 10px 0; }
  .criterion-name { font-size: 13px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
  .scores-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .likert { display: flex; gap: 6px; justify-content: center; }
  .likert label { flex: 1; }
  .likert input { display: none; }
  .likert span {
    display: flex; align-items: center; justify-content: center;
    height: 40px; border-radius: 6px; font-size: 15px; font-weight: 600;
    cursor: pointer; border: 1.5px solid #333; color: #666; background: #111;
    transition: all 0.15s;
  }
  .likert input:checked + span { border-color: transparent; color: #fff; }
  .red-group .likert input:checked + span { background: #dc2626; }
  .blue-group .likert input:checked + span { background: #2563eb; }
  .likert span:hover { border-color: #555; color: #ccc; }

  .submit-btn {
    width: 100%; padding: 16px; margin: 20px 0;
    background: #7c3aed; border: none; border-radius: 10px;
    color: #fff; font-size: 17px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-btn:not(:disabled):hover { opacity: 0.9; }

  .submitted-msg { text-align: center; padding: 24px; color: #86efac; font-size: 16px; }
</style>
</head>
<body>

<div id="setup">
  <h1>Judge Login</h1>
  <p>Enter your name to join the battle</p>
  <input id="judge-name-input" type="text" placeholder="Your name (e.g. Judge 1)" maxlength="30">
  <button onclick="joinAsJudge()">Join as Judge</button>
</div>

<div id="app">
  <div class="header">
    <h2 id="event-name">Dance Battle</h2>
    <div class="round" id="round-label">Round 1</div>
  </div>

  <div id="status-banner" class="status-banner status-waiting">Waiting for MC to open voting...</div>

  <div id="scoring-area"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io()
  let judgeName = ''
  let criteria = []
  let submitted = false
  let currentStatus = 'waiting'

  function joinAsJudge() {
    const name = document.getElementById('judge-name-input').value.trim()
    if (!name) return
    judgeName = name
    document.getElementById('setup').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    socket.emit('joinAs', 'judge')
  }

  socket.on('stateUpdate', (state) => {
    currentStatus = state.status
    criteria = state.criteria || criteria

    document.getElementById('event-name').textContent = state.eventName || 'Dance Battle'
    document.getElementById('round-label').textContent = `Round ${state.roundNumber}`

    const banner = document.getElementById('status-banner')

    if (submitted && state.status === 'open') {
      banner.className = 'status-banner status-submitted'
      banner.textContent = 'Scores submitted — waiting for other judges'
      document.getElementById('scoring-area').innerHTML = `<div class="submitted-msg">✓ Your scores are in</div>`
      return
    }

    if (state.status === 'waiting') {
      submitted = false
      banner.className = 'status-banner status-waiting'
      banner.textContent = 'Waiting for MC to open voting...'
      document.getElementById('scoring-area').innerHTML = ''
    } else if (state.status === 'open' && !submitted) {
      banner.className = 'status-banner status-open'
      banner.textContent = 'Voting is open — submit your scores'
      renderForm(state)
    } else if (state.status === 'locked') {
      banner.className = 'status-banner status-locked'
      banner.textContent = submitted ? '✓ Scores locked in' : 'Voting is now locked'
      if (!submitted) document.getElementById('scoring-area').innerHTML = ''
    } else if (state.status === 'revealed') {
      banner.className = 'status-banner status-revealed'
      banner.textContent = 'Result revealed — see the display'
      submitted = false
    }
  })

  function renderForm(state) {
    const area = document.getElementById('scoring-area')
    let html = `
      <div class="corners">
        <div class="corner-label red-label">${state.redName}</div>
        <div class="corner-label blue-label">${state.blueName}</div>
      </div>
      <div class="criteria">`

    criteria.forEach((criterion, i) => {
      html += `<div class="criterion-row">
        <div class="criterion-name">${criterion}</div>
        <div class="scores-row">
          <div class="red-group likert">`
      for (let v = 1; v <= 5; v++) {
        html += `<label><input type="radio" name="red-${i}" value="${v}" required><span>${v}</span></label>`
      }
      html += `</div><div class="blue-group likert">`
      for (let v = 1; v <= 5; v++) {
        html += `<label><input type="radio" name="blue-${i}" value="${v}" required><span>${v}</span></label>`
      }
      html += `</div></div></div>`
    })

    html += `</div>
      <button class="submit-btn" id="submit-btn" onclick="submitScores()">Submit Scores</button>`
    area.innerHTML = html
  }

  function submitScores() {
    if (currentStatus !== 'open') return
    const red = [], blue = []

    for (let i = 0; i < criteria.length; i++) {
      const r = document.querySelector(`input[name="red-${i}"]:checked`)
      const b = document.querySelector(`input[name="blue-${i}"]:checked`)
      if (!r || !b) {
        alert('Please score all criteria for both corners before submitting.')
        return
      }
      red.push(parseInt(r.value))
      blue.push(parseInt(b.value))
    }

    socket.emit('submitScores', { judgeId: judgeName, red, blue })
    submitted = true

    document.getElementById('status-banner').className = 'status-banner status-submitted'
    document.getElementById('status-banner').textContent = 'Scores submitted — waiting for other judges'
    document.getElementById('scoring-area').innerHTML = `<div class="submitted-msg">✓ Your scores are in</div>`
  }
</script>
</body>
</html>
