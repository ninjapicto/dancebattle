<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Judge Scoring</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding: 16px; }
  .screen { max-width: 480px; margin: 0 auto; display: none; }
  .screen.active { display: block; }

  #screen-login { margin-top: 60px; text-align: center; }
  #screen-login h1 { font-size: 24px; margin-bottom: 8px; }
  #screen-login p { color: #888; margin-bottom: 24px; }
  .field { margin-bottom: 12px; text-align: left; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  .field input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; }
  .primary-btn { width: 100%; padding: 14px; background: #7c3aed; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .error-msg { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 12px; display: none; }

  .header { text-align: center; padding: 16px 0 8px; }
  .header h2 { font-size: 20px; font-weight: 700; }
  .header .who { font-size: 12px; color: #444; margin-top: 4px; }
  .banner { text-align: center; padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 14px; font-weight: 500; }
  .banner-waiting  { background: #1a1a1a; color: #888; }
  .banner-open     { background: #14532d; color: #86efac; }
  .banner-locked   { background: #431407; color: #fdba74; }
  .banner-revealed { background: #1a1a1a; color: #888; }

  .corners { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0; }
  .corner-label { text-align: center; padding: 8px; border-radius: 6px; font-weight: 700; font-size: 14px; }
  .red-label  { background: #7f1d1d; color: #fca5a5; }
  .blue-label { background: #1e3a8a; color: #93c5fd; }

  .criterion-row { border-bottom: 1px solid #1a1a1a; padding: 10px 0; }
  .criterion-name { font-size: 13px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
  .scores-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .likert { display: flex; gap: 6px; }
  .likert label { flex: 1; }
  .likert input { display: none; }
  .likert span { display: flex; align-items: center; justify-content: center; height: 40px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; border: 1.5px solid #333; color: #666; background: #111; transition: all 0.15s; }
  .likert input:checked + span { border-color: transparent; color: #fff; }
  .red-group  .likert input:checked + span { background: #dc2626; }
  .blue-group .likert input:checked + span { background: #2563eb; }
  .submit-btn { width: 100%; padding: 16px; margin: 20px 0; background: #7c3aed; border: none; border-radius: 10px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; }

  #screen-submitted { text-align: center; padding: 40px 20px; }
  .big-tick { font-size: 56px; margin-bottom: 16px; }
  .sub-title { font-size: 24px; font-weight: 700; color: #86efac; margin-bottom: 8px; }
  .sub-msg { color: #888; font-size: 14px; margin-bottom: 32px; line-height: 1.6; padding: 0 16px; }
  .amend-btn { padding: 14px 32px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #aaa; font-size: 15px; font-weight: 600; cursor: pointer; }
  .amend-btn:hover { border-color: #555; color: #fff; }
  .lock-notice { color: #fdba74; font-size: 13px; margin-top: 16px; line-height: 1.6; padding: 0 16px; }
</style>
</head>
<body>

<div class="screen active" id="screen-login">
  <h1>Judge Login</h1>
  <p>Enter Your Details to Join</p>
  <div class="error-msg" id="error-msg"></div>
  <div class="field">
    <label>Your Name</label>
    <input id="inp-name" type="text" placeholder="e.g. Sarah" maxlength="30">
  </div>
  <div class="field" id="pw-field" style="display:none">
    <label>Event Password</label>
    <input id="inp-password" type="password" placeholder="Enter Password">
  </div>
  <button class="primary-btn" onclick="login()">Join as Judge</button>
</div>

<div class="screen" id="screen-app">
  <div class="header">
    <h2 id="round-label">Round 1</h2>
    <div class="who" id="who-label"></div>
  </div>
  <div class="banner banner-waiting" id="banner">Waiting for MC to Open Voting...</div>
  <div id="scoring-area"></div>
</div>

<div class="screen" id="screen-submitted">
  <div class="big-tick">✓</div>
  <div class="sub-title">Scores Submitted</div>
  <div class="sub-msg" id="sub-msg">Waiting for the MC to Lock Voting.</div>
  <button class="amend-btn" id="amend-btn" onclick="goAmend()">Amend Scores</button>
  <div class="lock-notice" id="lock-notice" style="display:none"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io()

  let myName    = ''
  let criteria  = []
  let lastScores = null
  let lastState  = null
  let curStatus  = 'waiting'

  // Check if password required before user does anything
  socket.emit('probe')
  socket.on('probeResponse', ({ hasPassword }) => {
    document.getElementById('pw-field').style.display = hasPassword ? 'block' : 'none'
  })

  // Auth response
  socket.on('authOk', () => {
    document.getElementById('who-label').textContent = 'Logged In As: ' + myName
    show('app')
    setBanner('waiting', 'Waiting for MC to Open Voting...')
  })

  socket.on('authError', (msg) => {
    myName = ''
    showErr(msg)
  })

  // State updates from server
  socket.on('stateUpdate', (s) => {
    curStatus = s.status
    if (s.criteria && s.criteria.length) criteria = s.criteria
    if (s.hasPassword !== undefined)
      document.getElementById('pw-field').style.display = s.hasPassword ? 'block' : 'none'

    // Ignore state updates until logged in
    if (current() === 'login') return

    lastState = s
    document.getElementById('round-label').textContent = 'Round ' + s.roundNumber

    if (s.status === 'waiting') {
      lastScores = null
      show('app')
      setBanner('waiting', 'Waiting for MC to Open Voting...')
      document.getElementById('scoring-area').innerHTML = ''

    } else if (s.status === 'open') {
      if (current() === 'submitted') {
        // Already submitted — let them know they can still amend
        setSubMsg('Voting Is Open — You Can Still Amend Your Scores.')
        showAmend(true)
      } else {
        show('app')
        setBanner('open', 'Voting Is Open — Score Both Corners for Each Criterion')
        renderForm(s)
      }

    } else if (s.status === 'locked') {
      if (current() === 'submitted') {
        setSubMsg('Your Scores Have Been Locked In.')
        showAmend(false)
      } else if (current() === 'app' && lastScores) {
        // Was mid-amend — show submitted screen with warning
        show('submitted')
        setSubMsg('Voting Was Locked While You Were Amending.')
        showAmend(false)
        showLockNotice('Your Previously Submitted Scores Have Been Counted — Any Changes You Were Making Were Not Saved.')
      } else {
        // Never submitted
        show('app')
        setBanner('locked', 'Voting Is Now Locked — No Scores Were Recorded from You')
        document.getElementById('scoring-area').innerHTML = ''
      }

    } else if (s.status === 'revealed') {
      lastScores = null
      show('app')
      setBanner('revealed', 'Result Revealed — See the Display Screen')
      document.getElementById('scoring-area').innerHTML = ''
    }
  })

  function login() {
    const name = document.getElementById('inp-name').value.trim()
    const pass = document.getElementById('inp-password').value
    if (!name) { showErr('Please Enter Your Name.'); return }
    myName = name
    socket.emit('joinAs', { role: 'judge', password: pass, judgeName: name })
  }

  function renderForm(s) {
    const redName  = (s && s.redName)  || (lastState && lastState.redName)  || 'Red Corner'
    const blueName = (s && s.blueName) || (lastState && lastState.blueName) || 'Blue Corner'
    let html = `<div class="corners">
      <div class="corner-label red-label">${redName}</div>
      <div class="corner-label blue-label">${blueName}</div>
    </div>`
    criteria.forEach((c, i) => {
      const pr = lastScores ? lastScores.red[i]  : null
      const pb = lastScores ? lastScores.blue[i] : null
      html += `<div class="criterion-row">
        <div class="criterion-name">${c}</div>
        <div class="scores-row">
          <div class="red-group likert">`
      for (let v = 1; v <= 5; v++)
        html += `<label><input type="radio" name="r${i}" value="${v}"${pr===v?' checked':''}><span>${v}</span></label>`
      html += `</div><div class="blue-group likert">`
      for (let v = 1; v <= 5; v++)
        html += `<label><input type="radio" name="b${i}" value="${v}"${pb===v?' checked':''}><span>${v}</span></label>`
      html += `</div></div></div>`
    })
    html += `<button class="submit-btn" onclick="submitScores()">Submit Scores</button>`
    document.getElementById('scoring-area').innerHTML = html
  }

  function submitScores() {
    if (curStatus !== 'open') return
    const red = [], blue = []
    for (let i = 0; i < criteria.length; i++) {
      const r = document.querySelector(`input[name="r${i}"]:checked`)
      const b = document.querySelector(`input[name="b${i}"]:checked`)
      if (!r || !b) { alert('Please Score All Criteria for Both Corners Before Submitting.'); return }
      red.push(+r.value)
      blue.push(+b.value)
    }
    lastScores = { red, blue }
    socket.emit('submitScores', { judgeId: myName, red, blue })
    show('submitted')
    setSubMsg('Waiting for the MC to Lock Voting.')
    showAmend(true)
    showLockNotice('')
  }

  function goAmend() {
    if (curStatus !== 'open') return
    show('app')
    setBanner('open', 'Amend Your Scores and Resubmit')
    renderForm(lastState)
  }

  // Helpers
  function show(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    document.getElementById('screen-' + name).classList.add('active')
  }
  function current() {
    const a = document.querySelector('.screen.active')
    return a ? a.id.replace('screen-', '') : 'login'
  }
  function setBanner(type, text) {
    const b = document.getElementById('banner')
    b.className = 'banner banner-' + type
    b.textContent = text
  }
  function showErr(msg) {
    const e = document.getElementById('error-msg')
    e.textContent = msg
    e.style.display = 'block'
  }
  function setSubMsg(msg) {
    document.getElementById('sub-msg').textContent = msg
  }
  function showAmend(visible) {
    document.getElementById('amend-btn').style.display = visible ? 'inline-block' : 'none'
    document.getElementById('lock-notice').style.display = 'none'
  }
  function showLockNotice(msg) {
    const el = document.getElementById('lock-notice')
    el.textContent = msg
    el.style.display = msg ? 'block' : 'none'
  }
</script>
</body>
</html>
