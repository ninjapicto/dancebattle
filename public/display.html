<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: system-ui, sans-serif;
    background: #0a0a0a; color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.7s ease;
  }

  .screen { width: 100%; text-align: center; padding: 40px; display: none; }
  .screen.active { display: block; }

  /* Waiting */
  #s-waiting .round-big { font-size: clamp(48px, 10vw, 120px); font-weight: 900; letter-spacing: -0.03em; }
  #s-waiting .waiting-sub { font-size: clamp(16px, 2.5vw, 30px); color: #333; margin-top: 20px; }

  /* Voting open */
  .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; padding: 0 40px; }
  .corner-block { padding: 32px 16px; border-radius: 16px; }
  .corner-red  { background: #7f1d1d; }
  .corner-blue { background: #1e3a8a; }
  .corner-name { font-size: clamp(28px, 5vw, 64px); font-weight: 800; }
  .corner-red  .corner-name { color: #fca5a5; }
  .corner-blue .corner-name { color: #93c5fd; }
  .vs-text { font-size: clamp(40px, 8vw, 100px); font-weight: 900; color: #222; }

  .round-sub { font-size: clamp(16px, 2.5vw, 28px); color: #444; margin-bottom: 20px; }
  .vote-status { font-size: clamp(14px, 2vw, 22px); color: #444; margin-top: 24px; }

  .judge-list { display: flex; justify-content: center; gap: 28px; margin-top: 16px; flex-wrap: wrap; }
  .judge-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .judge-dot  { width: 14px; height: 14px; border-radius: 50%; background: #1a1a1a; transition: background 0.4s; }
  .judge-dot.voted { background: #86efac; }
  .judge-dot-name { font-size: clamp(11px, 1.4vw, 16px); color: #333; transition: color 0.4s; }
  .judge-dot-name.voted { color: #86efac; }

  /* Revealed */
  .winner-label { font-size: clamp(18px, 3vw, 40px); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; margin-bottom: 12px; }
  .winner-name  { font-size: clamp(60px, 14vw, 160px); font-weight: 900; line-height: 1; letter-spacing: -0.03em; animation: pulse 0.7s ease-in-out 3; }
  .winner-score { font-size: clamp(18px, 3vw, 40px); opacity: 0.5; margin-top: 16px; }
  .winner-red  { color: #fca5a5; }
  .winner-blue { color: #93c5fd; }
  .winner-tie  { color: #fbbf24; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  .judge-breakdown { display: flex; justify-content: center; gap: 36px; margin-top: 28px; flex-wrap: wrap; }
  .jb-card { text-align: center; }
  .jb-name  { font-size: clamp(12px, 1.6vw, 20px); color: #666; margin-bottom: 6px; }
  .jb-scores { display: flex; gap: 8px; align-items: baseline; justify-content: center; }
  .jb-red   { font-size: clamp(22px, 3.5vw, 44px); font-weight: 700; color: #f87171; }
  .jb-blue  { font-size: clamp(22px, 3.5vw, 44px); font-weight: 700; color: #60a5fa; }
  .jb-dash  { color: #333; font-size: clamp(16px, 2vw, 28px); }

  body.bg-red  { background: #3b0000; }
  body.bg-blue { background: #020b2e; }
  body.bg-tie  { background: #1a1200; }
</style>
</head>
<body>

<div class="screen active" id="s-waiting">
  <div class="round-big" id="w-round">Round 1</div>
  <div class="waiting-sub">Waiting to Begin...</div>
</div>

<div class="screen" id="s-voting">
  <div class="round-sub" id="v-round">Round 1</div>
  <div class="vs-grid">
    <div class="corner-block corner-red">
      <div class="corner-name" id="v-red">Red Corner</div>
    </div>
    <div class="vs-text">VS</div>
    <div class="corner-block corner-blue">
      <div class="corner-name" id="v-blue">Blue Corner</div>
    </div>
  </div>
  <div class="vote-status" id="v-status">Judges Voting...</div>
  <div class="judge-list" id="v-judges"></div>
</div>

<div class="screen" id="s-revealed">
  <div class="winner-label">Winner</div>
  <div class="winner-name" id="r-name"></div>
  <div class="winner-score" id="r-score"></div>
  <div class="judge-breakdown" id="r-breakdown"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io()
  socket.emit('joinAs', { role: 'display' })

  socket.on('stateUpdate', (s) => {
    // Update round labels
    document.getElementById('w-round').textContent = 'Round ' + s.roundNumber
    document.getElementById('v-round').textContent = 'Round ' + s.roundNumber
    document.getElementById('v-red').textContent   = s.redName
    document.getElementById('v-blue').textContent  = s.blueName

    // Judge dots
    const count     = s.judgeCount || 3
    const voted     = s.judgeNames || []
    const judgeList = document.getElementById('v-judges')
    judgeList.innerHTML = Array.from({ length: count }, (_, i) => {
      const name    = voted[i] || ('Judge ' + (i + 1))
      const hasVoted = i < voted.length
      return `<div class="judge-item">
        <div class="judge-dot${hasVoted ? ' voted' : ''}"></div>
        <div class="judge-dot-name${hasVoted ? ' voted' : ''}">${name}</div>
      </div>`
    }).join('')

    if (s.status === 'waiting') {
      document.body.className = ''
      show('waiting')

    } else if (s.status === 'open' || s.status === 'locked') {
      document.body.className = ''
      show('voting')
      document.getElementById('v-status').textContent =
        s.status === 'locked' ? 'Voting Locked — Awaiting Result...' : 'Judges Voting...'

    } else if (s.status === 'revealed' && s.tally) {
      show('revealed')
      const { tally, redName, blueName } = s
      let name, cls, bg

      if (tally.winner === 'red')       { name = redName;  cls = 'winner-red';  bg = 'bg-red'  }
      else if (tally.winner === 'blue') { name = blueName; cls = 'winner-blue'; bg = 'bg-blue' }
      else                              { name = 'TIE';    cls = 'winner-tie';  bg = 'bg-tie'  }

      document.body.className = bg
      const nameEl = document.getElementById('r-name')
      nameEl.textContent = name
      nameEl.className   = 'winner-name ' + cls
      document.getElementById('r-score').textContent = redName + ' ' + tally.red + ' – ' + tally.blue + ' ' + blueName

      // Per-judge breakdown
      const bd = document.getElementById('r-breakdown')
      bd.innerHTML = (tally.judgeBreakdown || []).map(j => `
        <div class="jb-card">
          <div class="jb-name">${j.judgeName}</div>
          <div class="jb-scores">
            <span class="jb-red">${j.red}</span>
            <span class="jb-dash">–</span>
            <span class="jb-blue">${j.blue}</span>
          </div>
        </div>`).join('')
    }
  })

  function show(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    document.getElementById('s-' + name).classList.add('active')
  }
</script>
</body>
</html>
