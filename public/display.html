<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: system-ui, sans-serif;
    background: #0a0a0a; color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.8s ease;
  }

  .screen { width: 100%; text-align: center; padding: 40px; display: none; }
  .screen.active { display: block; }

  #s-waiting .event-name { font-size: clamp(13px, 1.8vw, 22px); color: #2a2a2a; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 20px; min-height: 1em; }
  #s-waiting .round-big  { font-size: clamp(64px, 14vw, 160px); font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
  #s-waiting .wait-sub   { font-size: clamp(14px, 2vw, 26px); color: #1a1a1a; margin-top: 24px; }

  .round-label { font-size: clamp(14px, 2vw, 26px); color: #2a2a2a; margin-bottom: 24px; }
  .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; padding: 0 32px; }
  .corner-block { padding: 28px 16px; border-radius: 16px; }
  .corner-red  { background: #5b0000; }
  .corner-blue { background: #001060; }
  .corner-name { font-size: clamp(24px, 5vw, 64px); font-weight: 800; }
  .corner-red  .corner-name { color: #fca5a5; }
  .corner-blue .corner-name { color: #93c5fd; }
  .vs-text { font-size: clamp(36px, 7vw, 90px); font-weight: 900; color: #1a1a1a; }

  .vote-status { font-size: clamp(13px, 1.8vw, 22px); color: #2a2a2a; margin-top: 24px; }
  .judge-list  { display: flex; justify-content: center; gap: 28px; margin-top: 14px; flex-wrap: wrap; }
  .judge-item  { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .j-dot       { width: 12px; height: 12px; border-radius: 50%; background: #141414; transition: background 0.4s; }
  .j-dot.voted { background: #86efac; }
  .j-name      { font-size: clamp(10px, 1.3vw, 16px); color: #1a1a1a; transition: color 0.4s; }
  .j-name.voted { color: #86efac; }

  .winner-label { font-size: clamp(16px, 2.5vw, 36px); font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #444; margin-bottom: 10px; }
  .winner-name  { font-size: clamp(64px, 15vw, 180px); font-weight: 900; line-height: 1; letter-spacing: -0.03em; animation: pulse 0.65s ease-in-out 3; }
  .winner-score { font-size: clamp(16px, 2.5vw, 36px); color: #2a2a2a; margin-top: 16px; }
  .winner-red  { color: #fca5a5; }
  .winner-blue { color: #93c5fd; }
  .winner-tie  { color: #fbbf24; }
  @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.06) } }

  .judge-breakdown { display: flex; justify-content: center; gap: 40px; margin-top: 32px; flex-wrap: wrap; }
  .jb-card  { text-align: center; }
  .jb-name  { font-size: clamp(11px, 1.5vw, 20px); color: #333; margin-bottom: 6px; }
  .jb-scores { display: flex; gap: 8px; align-items: baseline; justify-content: center; }
  .jb-red   { font-size: clamp(20px, 3.5vw, 48px); font-weight: 700; color: #f87171; }
  .jb-blue  { font-size: clamp(20px, 3.5vw, 48px); font-weight: 700; color: #60a5fa; }
  .jb-dash  { font-size: clamp(14px, 2vw, 28px); color: #1a1a1a; }

  #s-round-saved .round-label { font-size: clamp(36px, 7vw, 90px); font-weight: 900; color: #fff; margin-bottom: 0; }
  #s-round-saved .wait-sub    { font-size: clamp(16px, 2.5vw, 28px); color: #333; }

  #s-battle-winner .winner-label { color: #c4b5fd; }

  body.bg-red  { background: #2a0000; }
  body.bg-blue { background: #000820; }
  body.bg-tie  { background: #0f0d00; }
</style>
</head>
<body>

<div class="screen active" id="s-waiting">
  <div class="event-name" id="w-event"></div>
  <div class="round-big"  id="w-round">Round 1</div>
  <div class="wait-sub">Waiting to Begin...</div>
</div>

<div class="screen" id="s-voting">
  <div class="round-label" id="v-round">Round 1</div>
  <div class="vs-grid">
    <div class="corner-block corner-red">
      <div class="corner-name" id="v-red">Red Corner</div>
    </div>
    <div class="vs-text">VS</div>
    <div class="corner-block corner-blue">
      <div class="corner-name" id="v-blue">Blue Corner</div>
    </div>
  </div>
  <div class="vote-status" id="v-status">Judges Voting...</div>
  <div class="judge-list"  id="v-judges"></div>
</div>

<div class="screen" id="s-revealed">
  <div class="winner-label">Winner</div>
  <div class="winner-name" id="r-name"></div>
  <div class="winner-score" id="r-score"></div>
  <div class="judge-breakdown" id="r-breakdown"></div>
</div>

<div class="screen" id="s-round-saved">
  <div class="round-label" id="rs-round">Round 1 Complete</div>
  <div class="wait-sub" style="margin-top:16px">Scores Recorded</div>
</div>

<div class="screen" id="s-battle-winner">
  <div class="winner-label">Battle Winner</div>
  <div class="winner-name" id="bw-name"></div>
  <div class="winner-score" id="bw-score"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io()
  socket.emit('joinAs', { role: 'display' })

  socket.on('stateUpdate', (s) => {
    document.getElementById('w-event').textContent = s.eventName || ''
    document.getElementById('w-round').textContent  = 'Round ' + s.roundNumber
    document.getElementById('v-round').textContent  = 'Round ' + s.roundNumber
    document.getElementById('v-red').textContent    = s.redName
    document.getElementById('v-blue').textContent   = s.blueName

    const count = s.judgeCount || 3
    const voted = s.judgeNames || []
    document.getElementById('v-judges').innerHTML =
      Array.from({ length: count }, (_, i) => {
        const name     = voted[i] || ('Judge ' + (i + 1))
        const hasVoted = i < voted.length
        return `<div class="judge-item">
          <div class="j-dot${hasVoted ? ' voted' : ''}"></div>
          <div class="j-name${hasVoted ? ' voted' : ''}">${name}</div>
        </div>`
      }).join('')

    if (s.status === 'waiting') {
      document.body.className = ''
      show('waiting')

    } else if (s.status === 'open' || s.status === 'locked') {
      document.body.className = ''
      show('voting')
      document.getElementById('v-status').textContent =
        s.status === 'locked' ? 'Voting Locked — Awaiting Result...' : 'Judges Voting...'

    } else if (s.status === 'revealed' && s.tally) {
      const { tally, redName, blueName } = s

      if (s.showRoundWinners === false) {
        document.body.className = ''
        show('round-saved')
        document.getElementById('rs-round').textContent = 'Round ' + s.roundNumber + ' Complete'
      } else {
        let name, cls, bg
        if      (tally.winner === 'red')  { name = redName;  cls = 'winner-red';  bg = 'bg-red'  }
        else if (tally.winner === 'blue') { name = blueName; cls = 'winner-blue'; bg = 'bg-blue' }
        else                              { name = 'TIE';    cls = 'winner-tie';  bg = 'bg-tie'  }

        document.body.className = bg
        show('revealed')

        const nameEl = document.getElementById('r-name')
        nameEl.textContent = name
        nameEl.className   = 'winner-name ' + cls

        document.getElementById('r-score').textContent =
          redName + ' ' + tally.red + ' – ' + tally.blue + ' ' + blueName

        document.getElementById('r-breakdown').innerHTML =
          (tally.judgeBreakdown || []).map(j => `
            <div class="jb-card">
              <div class="jb-name">${j.judgeName}</div>
              <div class="jb-scores">
                <span class="jb-red">${j.red}</span>
                <span class="jb-dash">–</span>
                <span class="jb-blue">${j.blue}</span>
              </div>
            </div>`).join('')
      }

    } else if (s.status === 'battle_over' && s.battleTally) {
      const { battleTally, redName, blueName } = s
      let name, cls, bg
      if      (battleTally.winner === 'red')  { name = redName;  cls = 'winner-red';  bg = 'bg-red'  }
      else if (battleTally.winner === 'blue') { name = blueName; cls = 'winner-blue'; bg = 'bg-blue' }
      else                                    { name = 'TIE';    cls = 'winner-tie';  bg = 'bg-tie'  }

      document.body.className = bg
      show('battle-winner')

      const nameEl = document.getElementById('bw-name')
      nameEl.textContent = name
      nameEl.className   = 'winner-name ' + cls

      document.getElementById('bw-score').textContent =
        redName + ' ' + battleTally.red + ' – ' + battleTally.blue + ' ' + blueName
    }
  })

  function show(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    document.getElementById('s-' + name).classList.add('active')
  }
</script>
</body>
</html>
