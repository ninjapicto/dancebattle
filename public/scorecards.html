<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorecards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; padding: 24px; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #555; font-size: 14px; margin-bottom: 24px; }
  .print-btn { padding: 10px 20px; background: #7c3aed; border: none; border-radius: 7px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 28px; }

  .judge-block { margin-bottom: 36px; }
  .judge-heading { font-size: 18px; font-weight: 700; color: #c4b5fd; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #1a1a1a; }

  .round-block { margin-bottom: 20px; }
  .round-heading { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #444; margin-bottom: 8px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 10px; color: #555; font-weight: 500; border-bottom: 1px solid #1a1a1a; }
  td { padding: 6px 10px; border-bottom: 1px solid #0f0f0f; color: #aaa; }
  td.r { color: #f87171; font-weight: 600; }
  td.b { color: #60a5fa; font-weight: 600; }
  .total-row td { border-top: 1px solid #222; color: #fff; font-weight: 600; padding-top: 8px; }
  .result-row td { font-size: 12px; color: #555; padding-top: 4px; border-bottom: none; }
  .c-red  { color: #f87171; }
  .c-blue { color: #60a5fa; }
  .c-tie  { color: #fbbf24; }
  .c-win  { color: #86efac; }

  .empty { color: #444; text-align: center; padding: 60px 20px; font-size: 14px; }

  @media print {
    body { background: #fff; color: #000; padding: 16px; }
    .print-btn { display: none; }
    .judge-heading { color: #5b21b6; border-color: #ddd; }
    th { color: #888; border-color: #ddd; }
    td { color: #333; border-color: #eee; }
    td.r { color: #dc2626; }
    td.b { color: #2563eb; }
    .total-row td { color: #000; border-color: #ccc; }
    .round-heading { color: #888; }
  }
</style>
</head>
<body>
<h1>Judge Scorecards</h1>
<p class="sub">Full Breakdown of Every Judge's Scores Across All Rounds</p>
<button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
<div id="content"><p class="empty">Loading...</p></div>

<script>
async function load() {
  const [cards, rounds] = await Promise.all([
    fetch('/api/scorecards').then(r => r.json()),
    fetch('/api/rounds').then(r => r.json())
  ])

  const content = document.getElementById('content')

  if (!cards.length) {
    content.innerHTML = '<p class="empty">No Scores Recorded Yet — Complete Some Rounds First.</p>'
    return
  }

  const roundMap = {}
  rounds.forEach(r => roundMap[r.id] = r)

  // Group by judge
  const byJudge = {}
  cards.forEach(row => {
    if (!byJudge[row.judge_name]) byJudge[row.judge_name] = []
    byJudge[row.judge_name].push(row)
  })

  let html = ''
  for (const [judge, rows] of Object.entries(byJudge)) {
    html += `<div class="judge-block"><div class="judge-heading">${judge}</div>`

    const byRound = {}
    rows.forEach(r => { if (!byRound[r.round_id]) byRound[r.round_id] = []; byRound[r.round_id].push(r) })

    for (const [roundId, criteria] of Object.entries(byRound)) {
      const r = roundMap[roundId]
      if (!r) continue
      const redTotal  = criteria.reduce((a, c) => a + c.red_score, 0)
      const blueTotal = criteria.reduce((a, c) => a + c.blue_score, 0)
      const jWinner   = redTotal > blueTotal ? 'red' : blueTotal > redTotal ? 'blue' : 'tie'
      const jLabel    = jWinner === 'red' ? r.red_name : jWinner === 'blue' ? r.blue_name : 'Tie'
      const oLabel    = r.winner === 'red' ? r.red_name : r.winner === 'blue' ? r.blue_name : 'Tie'
      const jCls      = jWinner === 'tie' ? 'c-tie' : 'c-win'
      const oCls      = r.winner === 'tie' ? 'c-tie' : 'c-win'

      html += `<div class="round-block">
        <div class="round-heading">Round ${r.round_number} — ${r.red_name} vs ${r.blue_name}</div>
        <table>
          <thead><tr><th>Criterion</th><th style="color:#f87171">${r.red_name}</th><th style="color:#60a5fa">${r.blue_name}</th></tr></thead>
          <tbody>`
      criteria.forEach(c => {
        html += `<tr><td>${c.criterion}</td><td class="r">${c.red_score}</td><td class="b">${c.blue_score}</td></tr>`
      })
      html += `</tbody>
          <tfoot>
            <tr class="total-row"><td>Total</td><td class="r">${redTotal}</td><td class="b">${blueTotal}</td></tr>
            <tr class="result-row">
              <td colspan="3">
                This Judge: <span class="${jCls}">${jLabel}</span>
                &nbsp;·&nbsp;
                Overall Result: <span class="${oCls}">${oLabel}</span>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>`
    }
    html += '</div>'
  }
  content.innerHTML = html
}

load()
</script>
</body>
</html>
